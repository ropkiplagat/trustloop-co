<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TrustLoop Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
.topbar{background:#161b22;border-bottom:1px solid #30363d;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:12px}
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg,#2563eb,#1d4ed8);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff}
.topbar-title{font-weight:600;font-size:15px}
.topbar-sub{font-size:12px;color:#8b949e}
.btn-sm{padding:6px 14px;background:#21262d;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif}
.btn-sm:hover{background:#30363d}
main{padding:24px;max-width:1200px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px}
.stat{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:18px}
.stat-n{font-size:28px;font-weight:700}
.stat-l{font-size:12px;color:#8b949e;margin-top:4px}
.section-head{font-size:15px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{padding:5px 14px;border-radius:20px;border:1px solid #30363d;background:transparent;color:#8b949e;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif}
.filter-btn.active{background:#2563eb;border-color:#2563eb;color:#fff}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;color:#8b949e;font-weight:500;border-bottom:1px solid #21262d;white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid #21262d;vertical-align:middle}
tr:hover td{background:#161b22}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-pending{background:#1f2937;color:#9ca3af}
.badge-reviewing{background:#1e3a5f;color:#60a5fa}
.badge-approved{background:#14532d;color:#4ade80}
.badge-rejected{background:#2d1f1f;color:#f87171}
.badge-conditional{background:#422006;color:#fb923c}
.score-good{color:#4ade80}
.score-avg{color:#fb923c}
.score-poor{color:#f87171}
.score-na{color:#8b949e}
.empty{text-align:center;padding:48px;color:#8b949e}
.loading{text-align:center;padding:48px;color:#8b949e}
select.status-select{background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:4px 8px;border-radius:6px;font-size:12px;cursor:pointer}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <div class="logo-mark">TL</div>
    <div>
      <div class="topbar-title">TrustLoop Admin</div>
      <div class="topbar-sub">Application Dashboard</div>
    </div>
  </div>
  <button class="btn-sm" onclick="logout()">Sign out</button>
</div>
<main>
  <div class="stats" id="stats">
    <div class="stat"><div class="stat-n" id="s-total">—</div><div class="stat-l">Total Applications</div></div>
    <div class="stat"><div class="stat-n" id="s-pending" style="color:#9ca3af">—</div><div class="stat-l">Pending</div></div>
    <div class="stat"><div class="stat-n" id="s-approved" style="color:#4ade80">—</div><div class="stat-l">Approved</div></div>
    <div class="stat"><div class="stat-n" id="s-rejected" style="color:#f87171">—</div><div class="stat-l">Rejected</div></div>
    <div class="stat"><div class="stat-n" id="s-avg">—</div><div class="stat-l">Avg Score</div></div>
  </div>
  <div class="section-head">
    Applications
    <button class="btn-sm" onclick="load()">↻ Refresh</button>
  </div>
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('')">All</button>
    <button class="filter-btn" onclick="setFilter('Pending')">Pending</button>
    <button class="filter-btn" onclick="setFilter('Reviewing')">Reviewing</button>
    <button class="filter-btn" onclick="setFilter('Approved')">Approved</button>
    <button class="filter-btn" onclick="setFilter('Rejected')">Rejected</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Ref</th><th>Name</th><th>Phone</th><th>County</th><th>Loan (KES)</th><th>Score</th><th>Status</th><th>Submitted</th><th>Action</th></tr></thead>
      <tbody id="tbody"><tr><td colspan="9" class="loading">Loading…</td></tr></tbody>
    </table>
  </div>
</main>
<script>
const API   = 'http://170.64.176.246:5001';
const token = localStorage.getItem('tl_admin_token');
let activeFilter = '';
let allApps = [];

if (!token) window.location.href = 'admin-login.html';

async function load() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '<tr><td colspan="9" class="loading">Loading…</td></tr>';
  try {
    const res  = await fetch(`${API}/api/admin/applications?limit=500`, {
      headers: {'Authorization': `Bearer ${token}`}
    });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    allApps = data.applications || [];
    renderStats(allApps);
    renderTable(filtered(allApps));
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="9" class="empty">Error loading data</td></tr>';
  }
}

function filtered(apps) {
  if (!activeFilter) return apps;
  return apps.filter(a => a.status === activeFilter);
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === (f || 'All'));
  });
  renderTable(filtered(allApps));
}

function renderStats(apps) {
  document.getElementById('s-total').textContent    = apps.length;
  document.getElementById('s-pending').textContent  = apps.filter(a=>a.status==='Pending').length;
  document.getElementById('s-approved').textContent = apps.filter(a=>a.status==='Approved').length;
  document.getElementById('s-rejected').textContent = apps.filter(a=>a.status==='Rejected').length;
  const scored = apps.filter(a=>a.score);
  document.getElementById('s-avg').textContent = scored.length
    ? Math.round(scored.reduce((s,a)=>s+a.score,0)/scored.length)
    : '—';
}

function renderTable(apps) {
  const tbody = document.getElementById('tbody');
  if (!apps.length) {
    tbody.innerHTML = '<tr><td colspan="9" class="empty">No applications</td></tr>';
    return;
  }
  tbody.innerHTML = apps.map(a => {
    const sc = a.score;
    const scClass = sc >= 700 ? 'score-good' : sc >= 580 ? 'score-avg' : sc ? 'score-poor' : 'score-na';
    const scText  = sc || '—';
    const bdg = {Pending:'badge-pending',Reviewing:'badge-reviewing',Approved:'badge-approved',Rejected:'badge-rejected',Conditional:'badge-conditional'}[a.status]||'badge-pending';
    const dt  = a.created_at ? a.created_at.split('T')[0] : '—';
    const amt = a.loan_amount ? Number(a.loan_amount).toLocaleString() : '—';
    return `<tr>
      <td style="font-family:monospace;font-size:12px">${a.ref}</td>
      <td>${esc(a.full_name)}</td>
      <td>${esc(a.phone||'')}</td>
      <td>${esc(a.county||'—')}</td>
      <td>${amt}</td>
      <td class="${scClass}">${scText}</td>
      <td><span class="badge ${bdg}">${a.status}</span></td>
      <td style="color:#8b949e">${dt}</td>
      <td>
        <select class="status-select" onchange="updateStatus('${a.ref}', this.value)" title="Change status">
          <option value="">— set —</option>
          ${['Pending','Reviewing','Approved','Rejected'].map(s=>`<option value="${s}"${a.status===s?' selected':''}>${s}</option>`).join('')}
        </select>
      </td>
    </tr>`;
  }).join('');
}

async function updateStatus(ref, status) {
  if (!status) return;
  try {
    await fetch(`${API}/api/applications/${ref}/status`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json', 'Authorization':`Bearer ${token}`},
      body: JSON.stringify({status})
    });
    load();
  } catch(e) { alert('Update failed'); }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function logout() {
  localStorage.removeItem('tl_admin_token');
  window.location.href = 'admin-login.html';
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
